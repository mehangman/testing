<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="sitemap" type="application/xml" href="/sitemap.xml">
    <meta name="description" content="OM International Courier offers reliable domestic and international shipping services from New Delhi. Track shipments, get quotes, and explore our partner network.">
    <link rel="canonical" href="https://ominternationalcourier.pages.dev/" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OM International Courier Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/services.css">
    <link rel="stylesheet" href="styles/tracking.css">
    <link rel="stylesheet" href="styles/contact.css">
    <script type="application/ld+json">
    {/* Keep the same JSON-LD data here */}
    </script>
</head>

<body class="bg-gray-100">
    <!-- Header -->
    <div data-include="sections/header.html"></div>

    <main>
        <!-- Hero Section -->
        <div data-include="sections/hero.html"></div>

        <!-- Services -->
        <div data-include="sections/services.html"></div>

        <!-- Rates -->
        <div data-include="sections/rates.html"></div>

        <!-- Service Areas -->
        <div data-include="sections/areas.html"></div>

        <!-- Contact -->
        <div data-include="sections/contact.html"></div>

        <!-- Tracking -->
        <div data-include="sections/tracking.html"></div>

        <!-- Partners -->
        <div data-include="sections/partners.html"></div>
    </main>

    <!-- Footer -->
    <div data-include="partials/footer.html"></div>

    <script src="scripts/main.js"></script>
    <script>
        // Include partials
        document.querySelectorAll('[data-include]').forEach(el => {
            const file = el.getAttribute('data-include');
            fetch(file)
                .then(res => res.text())
                .then(html => {
                    el.innerHTML = html;
                    el.removeAttribute('data-include');
                });
        });
    </script>
</body>
</html>
